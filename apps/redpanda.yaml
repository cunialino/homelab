apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: 'https://charts.redpanda.com/'
      chart: operator
      targetRevision: 26.1.2
      helm:
        parameters:
          - name: crds.enabled
            value: "true"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: redpanda
  syncPolicy:
    automated:
      enabled: false
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/cunialino/homelab.git'
      path: base/redpanda
      targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: redpanda
  syncPolicy:
    automated:
      enabled: false
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
