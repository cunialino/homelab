apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://seaweedfs.github.io/seaweedfs-operator/
    chart: seaweedfs-operator
    targetRevision: 0.1.21
    helm:
      values: |
        webhook:
          enabled: false

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: seaweedfs
  
  syncPolicy:
    automated:
      enabled: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
