apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets
  namespace: external-secrets
specs:
  - endpointSelector:
      matchLabels:
        app.kubernetes.io/name: bitwarden-sdk-server
        app.kubernetes.io/instance: external-secrets
    ingress:
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: external-secrets
              app.kubernetes.io/instance: external-secrets
        toPorts:
          - ports:
              - port: "9998"
                protocol: TCP
    egress:
      - toPorts:
          - ports:
              - port: "53"
                protocol: UDP
            rules:
              dns:
                - matchPattern: "*"
      - toFQDNs:
          - matchName: "vault.bitwarden.eu"
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP

  - endpointSelector:
      matchLabels:
        app.kubernetes.io/name: external-secrets
        app.kubernetes.io/instance: external-secrets
    egress:
      - toPorts:
          - ports:
              - port: "53"
                protocol: UDP
            rules:
              dns:
                - matchPattern: "*"
      - toEntities:
          - kube-apiserver
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: bitwarden-sdk-server
              app.kubernetes.io/instance: external-secrets
        toPorts:
          - ports:
              - port: "9998"
                protocol: TCP

  - endpointSelector:
      matchLabels:
        app.kubernetes.io/name: external-secrets-webhook
        app.kubernetes.io/instance: external-secrets
    ingress:
      - fromEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "10250"
                protocol: TCP
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
    egress:
      - toPorts:
          - ports:
              - port: "53"
                protocol: UDP
            rules:
              dns:
                - matchPattern: "*"
      - toEntities:
          - kube-apiserver

  - endpointSelector:
      matchLabels:
        app.kubernetes.io/name: external-secrets-cert-controller
        app.kubernetes.io/instance: external-secrets
    ingress:
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
    egress:
      - toPorts:
          - ports:
              - port: "53"
                protocol: UDP
            rules:
              dns:
                - matchPattern: "*"
      - toEntities:
          - kube-apiserver
