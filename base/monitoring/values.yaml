grafana:
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    storageClassName: "longhorn-wdblack"
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    finalizers:
      - kubernetes.io/pvc-protection

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 10d
    storageSpec:
      volumeClaimTemplate:
       spec:
         storageClassName: longhorn-wdblack
         accessModes: ["ReadWriteOnce"]
         resources:
           requests:
             storage: 25Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 3Gi

alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-telegram

  config:
    global:
      resolve_timeout: 5m

    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/telegram-token
            chat_id: 383720015
            parse_mode: HTML
            message: |
              {{ if eq .Status "firing" }}🔴 FIRING{{ else }}✅ RESOLVED{{ end }} <b>{{ .GroupLabels.alertname }}</b>

              {{ range .Alerts }}
              <b>Pod:</b> {{ .Labels.namespace }}/{{ .Labels.pod }}
              <b>Summary:</b> {{ .Annotations.summary }}
              <b>Severity:</b> {{ .Labels.severity }}
              <b>Since:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
              {{ end }}

    route:
      receiver: telegram
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"

        - receiver: "null"
          matchers:
            - severity = "info"

defaultRules:
  rules:
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false

nodeExporter:
  enabled: false
  forceDeployDashboards: true
prometheus-node-exporter:
  enabled: false

additionalPrometheusRulesMap:
  custom-alerts:
    groups:
      - name: pod-failure-alerts
        rules:
          - alert: PodImagePullBackOff
            expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} cannot pull image"
              description: "Container {{ $labels.container }} is stuck in ImagePullBackOff"

          - alert: PodFrequentlyRestarting
            expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
              description: "Pod has restarted {{ $value }} times in the last hour"

      - name: pvc-alerts
        rules:
          - alert: PVCUsageWarning
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} at 80% capacity"
              description: "PVC is {{ $value | humanizePercentage }} full"
