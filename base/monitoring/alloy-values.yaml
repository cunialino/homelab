alloy:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  mounts:
    varlog: true
    extra:
      - name: journal
        mountPath: /var/log/journal
        readOnly: true
      - name: proc
        mountPath: /host/proc
        readOnly: true
      - name: sys
        mountPath: /host/sys
        readOnly: true
      - name: rootfs
        mountPath: /host/root
        readOnly: true
  configMap:
    content: |
      loki.source.journal "nixos" {
        path       = "/run/log/journal"
        labels     = {job = "journal"}
        forward_to = [loki.write.local.receiver]
        relabel_rules = loki.relabel.journal.rules
      }

      loki.relabel "journal" {
        rule {
          source_labels = ["__journal__SYSTEMD_UNIT"]
          target_label  = "unit"
        }
        rule {
          source_labels = ["__journal__HOSTNAME"]
          target_label  = "hostname"
        }
        rule {
          source_labels = ["__journal__TRANSPORT"]
          target_label  = "transport"
        }
        forward_to = []
      }
      local.file_match "pods" {
        path_targets = [{"__path__" = "/var/log/pods/*/*/*.log"}]
      }
      loki.source.file "k3s" {
        targets    = local.file_match.pods.targets
        forward_to = [loki.process.pod_labels.receiver]
      }
      loki.process "pod_labels" {
        stage.regex {
          expression = "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*\\.log"
          source     = "filename"
        }
        stage.labels {
          values = {
            namespace = "namespace",
            pod       = "pod",
            container = "container",
          }
        }
        forward_to = [loki.write.local.receiver]
      }
      loki.write "local" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }
      prometheus.exporter.unix "node" {
        procfs_path    = "/host/proc"
        sysfs_path     = "/host/sys"
        rootfs_path    = "/host/root"
        udev_data_path = "/host/root/run/udev/data"
      }

      prometheus.scrape "node" {
        targets    = prometheus.exporter.unix.node.targets
        forward_to = [prometheus.relabel.node.receiver]
        clustering {
          enabled = false
        }
      }
      prometheus.relabel "node" {
        rule {
          target_label = "job"
          replacement  = "node-exporter"
        }
        forward_to = [prometheus.remote_write.local.receiver]
      }
      prometheus.remote_write "local" {
        endpoint {
          url = "http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write"
        }
      }

controller:
  hostPID: true
  volumes:
    extra:
      - name: journal
        hostPath:
          path: /run/log/journal
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: rootfs
        hostPath:
          path: /
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
